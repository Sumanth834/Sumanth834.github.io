<!doctype html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Sumanth Raj | Experience</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

.panel {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 3rem;
}

.sub {
  color: #aaa;
  margin-top: 20px;
}

.button {
  padding: 12px 25px;
  background: #22c55e;
  color: white;
  border-radius: 6px;
  text-decoration: none;
  display: inline-block;
  margin-top: 20px;
}
</style>
</head>

<body>

<section class="panel"><h1>Hi, I'm Sumanth</h1></section>
<section class="panel"><h1>Data & Strategy Analyst</h1></section>
<section class="panel"><h1>SQL • Python • Analytics</h1></section>
<section class="panel"><h1>Delhivery • Accenture</h1></section>
<section class="panel"><h1>Projects that drive insights</h1></section>
<section class="panel">
  <div>
    <h1>Let’s connect</h1>
    <a href="resume.html" class="button">View Resume</a>
  </div>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

let panels = gsap.utils.toArray(".panel");

panels.forEach((panel, i) => {
  gsap.from(panel, {
    opacity: 0,
    y: 100,
    duration: 1,
    scrollTrigger: {
      trigger: panel,
      start: "top 80%",
      toggleActions: "play none none none"
    }
  });
});
</script>

</body>
</html>
