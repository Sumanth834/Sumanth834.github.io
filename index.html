<!doctype html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Sumanth Raj | Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
}

/* NAVBAR */
.navbar {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px;
}

/* GLASS */
.glass {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 30px;
  margin: 20px;
  backdrop-filter: blur(10px);
}

/* BUTTON */
.button {
  padding: 12px 25px;
  background: #22c55e;
  color: white;
  border-radius: 6px;
  text-decoration: none;
}

/* PROJECTS */
.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

/* BIRD */
#bird {
  position: fixed;
  top: 100px;
  left: -100px;
  font-size: 40px;
  animation: fly 6s linear forwards;
}

@keyframes fly {
  0% { left: -100px; }
  100% { left: 110%; }
}

#drop {
  position: fixed;
  top: 160px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  transition: 1s;
}
</style>
</head>

<body>

<!-- BIRD -->
<div id="bird">🕊️</div>

<!-- DROPPED BUTTON -->
<div id="drop">
  <a href="resume.html" class="button">View Resume</a>
</div>

<!-- NAV -->
<div class="navbar">
  <a href="#">Home</a>
  <a href="#projects">Projects</a>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Hi, I'm Sumanth 👋</h1>
  <p id="typing"></p>
</div>

<!-- ABOUT -->
<div class="glass">
  <h2>About Me</h2>
  <p>Data & Strategy Analyst at Delhivery working on SQL, Python and analytics.</p>
</div>

<!-- PROJECTS -->
<div class="glass" id="projects">
  <h2>Projects</h2>
  <div class="projects">
    <div class="card">
      <h3>Bank CRM Analysis</h3>
      <p>10,000+ users analyzed</p>
    </div>
    <div class="card">
      <h3>Chinook SQL</h3>
      <p>Advanced SQL insights</p>
    </div>
    <div class="card">
      <h3>Zomato Analysis</h3>
      <p>Market expansion insights</p>
    </div>
  </div>
</div>

<!-- CONTACT -->
<div class="glass">
  <h2>Contact</h2>
  <a href="mailto:sumanthrajs98@gmail.com" class="button">Email</a>
</div>

<!-- SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
<script>
new Typed("#typing", {
  strings: ["Data Analyst", "SQL • Python • Power BI"],
  typeSpeed: 50,
  loop: true
});

setTimeout(() => {
  document.getElementById("drop").style.opacity = 1;
}, 3000);
</script>

</body>
</html>
